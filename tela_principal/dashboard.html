<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Disponibilidade</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

     <header class="header">
        <div class="left">
            <i class="fas fa-bars" title="Menu"></i>
            <i class="fas fa-search" title="Pesquisar"></i>
        </div>
        <div class="logo">
            <img src="../assets/logo_gauge_menor.png" alt="Gauge Logo">
        </div>
    </header>
    
    <div class="title">

    <h1 class="title">Painel de Disponibilidade</h1>

    </div>

    <div class="container">

        <div class="card">
            <div class="icon">
                <i class="fas fa-train"></i>
            </div>

            <div class="info">
                <h2>TRENS DE PASSAGEIRO</h2>
                <p>Ativos: 3</p>
            </div>
        </div>

        <div class="card">
            <div class="icon">
                <i class="fas fa-box"></i>
            </div>

            <div class="info">
                <h2>TRENS DE CARGA</h2>
                <p>Ativos: 4</p>
            </div>
        </div>

        <div class="card">
            <div class="icon">
                <i class="fas fa-wrench"></i>
            </div>

            <div class="info">
                <h2>EM MANUTENÇÃO</h2>
                <p>Quantidade: 2</p>
            </div>
        </div>

        <div class="card">
            <div class="icon">
                <i class="fas fa-ban"></i>
            </div>

            <div class="info">
                <h2>TRENS INATIVOS</h2>
                <p>Quantidade: 2</p>
            </div>
        </div>

    </div>

</body>
</html>
