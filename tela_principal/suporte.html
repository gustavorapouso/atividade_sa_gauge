<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="suporte.css">
    <title>Suporte</title>
</head>
<body>
    <header class="header">
        <div class="left">
            <i class="fas fa-bars" title="Menu"></i>
            <i class="fas fa-search" title="Pesquisar"></i>
        </div>
        <div class="logo">
            <img src="../assets/logo_gauge_menor.png" alt="Gauge Logo">
        </div>
    </header>
    
    <main class="container-suporte">
        <h1 class="titulo-principal">SUPORTE</h1>
        
        
        <div class="bloco-contato">
            <p class="subtitulo">Precisa de Suporte?</p>
            <div class="info-link">
                <i class="far fa-envelope icone-contato"></i>
                <a href="mailto:contato@gauge.com.br" class="detalhe-contato underline">contato@gauge.com.br</a>
            </div>
        </div>
        
        
        <div class="bloco-contato">
            <p class="subtitulo">Entre em contato</p>
            <div class="info-link">
                <i class="fas fa-phone-alt icone-contato"></i>
                <span class="detalhe-contato">(47) 99917-4896</span>
            </div>
        </div>
    </main>

    <footer class="footer-gauge">
    <div class="footer-container">
        
        <div class="footer-bloco bloco-esquerda">
            <span class="footer-label">Entre em contato</span>
            <a href="tel:47999174896" class="footer-link">(47) 99917-4896</a>
        </div>

        <div class="footer-bloco bloco-centro">
            <img src="../assets/logo_gauge_menor.png" alt="Gauge Logo" class="footer-logo">
            <p class="footer-copyright">&copy; 2026 Gauge. Todos os direitos reservados.</p>
        </div>

        <div class="footer-bloco bloco-direita">
            <span class="footer-label">Precisa de Suporte?</span>
            <a href="mailto:contato@gauge.com.br" class="footer-link link-sublinhado">contato@gauge.com.br</a>
        </div>

    </div>
</footer>
</body>
</html>
