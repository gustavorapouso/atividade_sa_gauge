<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="carga.css">
    <title>Mapa Carga</title>
</head>
<body>

    <header class="header">
        <div class="left">
            <i class="fas fa-bars" title="Menu"></i>
            <i class="fas fa-search" title="Pesquisar"></i>
        </div>
        <div class="logo">
            <img src="../assets/logo_gauge_menor.png" alt="Gauge Logo">
        </div>
    </header>

    <main class="content-container">
    <section class="screen-section">
        <div class="select-wrapper">
            <select class="select-badge">
                <option value="carga" selected>CARGA</option>
                <option value="rotas">ROTAS</option>
            </select>
        </div>
        
        <div class="search-bar">
            <i class="fas fa-bars menu-icon"></i>
            <input type="text" placeholder="Acompanhar carga...">
            <i class="fas fa-search search-icon"></i>
        </div>

        <div class="map-placeholder">
            <svg width="100%" height="100%" viewBox="0 0 500 320" preserveAspectRatio="none">
                <rect x="1" y="1" width="498" height="318" fill="white" stroke="black" stroke-width="2" />
            </svg>
        </div>

        <div class="timeline">
            <div class="timeline-item">
                <div class="radio-circle"></div>
                <p>Recebemos a sua carga no centro de distribuição.</p>
            </div>
            <div class="timeline-item">
                <div class="radio-circle"></div>
                <p>Saiu do centro de distribuição e está em trânsito.</p>
            </div>
            <div class="timeline-item active">
                <div class="radio-circle active-circle"></div>
                <p>Sua carga está na última etapa do percurso.</p>
            </div>
        </div>
    </section>

    

    <section class="screen-section">
        <div class="select-wrapper">
            <select class="select-badge">
                <option value="carga">CARGA</option>
                <option value="rotas" selected>ROTAS</option>
            </select>
        </div>

        <div class="search-bar">
            <i class="fas fa-bars menu-icon"></i>
            <input type="text" placeholder="Acompanhar rotas...">
            <i class="fas fa-search search-icon"></i>
        </div>

        <div class="map-placeholder">
            <svg width="100%" height="100%" viewBox="0 0 500 320" preserveAspectRatio="none">
                <rect x="1" y="1" width="498" height="318" fill="white" stroke="black" stroke-width="2" />
            </svg>
        </div>

        <div class="eta-container">
            <h2 class="eta-title">CHEGADA AO DESTINO:</h2>
            <div class="eta-time">
                <i class="far fa-clock"></i>
                <span>14:12</span>
            </div>
        </div>
    </section>
</main>

<footer class="footer-gauge">
    <div class="footer-container">
        
        <div class="footer-bloco bloco-esquerda">
            <span class="footer-label">Entre em contato</span>
            <a href="tel:47999174896" class="footer-link">(47) 99917-4896</a>
        </div>

        <div class="footer-bloco bloco-centro">
            <img src="../assets/logo_gauge_menor.png" alt="Gauge Logo" class="footer-logo">
            <p class="footer-copyright">&copy; 2026 Gauge. Todos os direitos reservados.</p>
        </div>

        <div class="footer-bloco bloco-direita">
            <span class="footer-label">Precisa de Suporte?</span>
            <a href="mailto:contato@gauge.com.br" class="footer-link link-sublinhado">contato@gauge.com.br</a>
        </div>

    </div>
</footer>

</body>
</html>
