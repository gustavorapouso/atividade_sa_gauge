<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="minha_rota.css">
    <title>Minha rota</title>
</head>
<body>
    <header class="header">
        <div class="left">
            <i class="fas fa-bars" title="Menu"></i>
            <i class="fas fa-search" title="Pesquisar"></i>
        </div>
        <div class="logo">
            <img src="../assets/logo_gauge_menor.png" alt="Gauge Logo">
        </div>
    </header>

    <main class="container-rota">
        <h1 class="titulo-pagina">Minha Rota</h1>

        <div class="conteudo-flex">
            <div class="mapa-container">
                <svg width="100%" height="100%" viewBox="0 0 500 320" preserveAspectRatio="none">
                    <rect x="1" y="1" width="498" height="318" fill="white" stroke="black" stroke-width="2" rx="4"/>
                </svg>
            </div>

            <div class="filtros-container">
                <div class="campo-grupo">
                    <label class="rotulo">Selecione o dia:</label>
                    <div class="select-wrapper">
                        <select class="select-filtro">
                            <option value="" disabled selected hidden>dia</option>
                        </select>
                    </div>
                </div>

                <div class="campo-grupo">
                    <label class="rotulo">Selecione o horário:</label>
                    <div class="select-wrapper">
                        <select class="select-filtro">
                            <option value="" disabled selected hidden>hora</option>
                        </select>
                    </div>
                </div>

                <button type="button" class="btn-confirmar">Confirmar</button>
            </div>
        </div>
    </main>

    <footer class="footer-gauge">
    <div class="footer-container">
        
        <div class="footer-bloco bloco-esquerda">
            <span class="footer-label">Entre em contato</span>
            <a href="tel:47999174896" class="footer-link">(47) 99917-4896</a>
        </div>

        <div class="footer-bloco bloco-centro">
            <img src="../assets/logo_gauge_menor.png" alt="Gauge Logo" class="footer-logo">
            <p class="footer-copyright">&copy; 2026 Gauge. Todos os direitos reservados.</p>
        </div>

        <div class="footer-bloco bloco-direita">
            <span class="footer-label">Precisa de Suporte?</span>
            <a href="mailto:contato@gauge.com.br" class="footer-link link-sublinhado">contato@gauge.com.br</a>
        </div>

    </div>
</footer>
</body>
</html>
