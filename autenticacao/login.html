<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gauge</title>

    <link rel="stylesheet" href="login.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <div class="container">

        <div class="lado-esquerdo">
            <img src="../assets/tela_cadastrar_img.png" alt="Banner" class="imagem">
        </div>

        <div class="lado-direito">

            <div class="card-login">

                <h1>LOGIN</h1>

                <h3>BEM-VINDO!</h3>

                <img src="../assets/logo_gauge_menor.png" alt="Logo Gauge" class="logo">

                <form>

                    <div class="campo">
                        <i class="bi bi-person-fill"></i>
                        <input type="text" placeholder="Nome">
                    </div>

                    <div class="campo">
                        <i class="bi bi-lock-fill"></i>
                        <input type="password" placeholder="Senha">
                    </div>

                    <a href="#" class="esqueceu">esqueceu sua senha?</a>

                    <button type="submit">Entrar</button>

                </form>

                <div class="rodape-login">

                    <a href="cadastro.html" class="cadastro">cadastrar-se</a>

                    <div class="redes">
                        <i class="bi bi-google"></i>
                        <i class="bi bi-facebook"></i>
                        <i class="bi bi-linkedin"></i>
                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
