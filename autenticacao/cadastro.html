<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="cadastro.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <h1>CADASTRE-SE</h1>

    <div class="perfil">
        <i class="bi bi-person-fill"></i>
    </div>

    <form>

        <input type="text" id="nome" name="nome" placeholder="Nome Completo">

        <input type="text" id="nascimento" name="nascimento" placeholder="Data de nascimento">

        <input type="text" id="email" name="email" placeholder="E-mail">

        <input type="text" id="telefone" name="telefone" placeholder="Telefone">

        <input type="password" id="senha" name="senha" placeholder="Sua senha">

        <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Confirmar senha">

        <select name="perfil" id="perfil">
            <option value="">Perfil</option>
            <option value="cliente">Cliente</option>
            <option value="gestor">Gestor</option>
            <option value="maquinista">Maquinista</option>
        </select>

        <button type="submit">Salvar</button>

    </form>

    <button type="button" class="voltar" onclick="window.location.href='login.html'">
        Voltar ao login
    </button>

</body>
</html>
